{% extends "base.html" %}

{% block content %}
<section class="page-hero">
    <span class="page-eyebrow">O QUE FAZEMOS</span>
    <h1>Nossos Serviços</h1>
</section>

<section class="services-full">
    {% for s in servicos %}
    <div class="service-row">
        <span class="service-spark">⚡</span>
        <div>
            <h3>{{ s.title }}</h3>
            <p>{{ s.description }}</p>
        </div>
    </div>
    {% else %}
    <p>Nenhum serviço cadastrado ainda.</p>
    {% endfor %}
</section>
{% endblock %}

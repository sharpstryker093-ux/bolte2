{% extends "base.html" %}

{% block content %}
<section class="page-hero">
    <span class="page-eyebrow">FALE COM A GENTE</span>
    <h1>Contato</h1>
</section>

<section class="contact-wrap">
    <div class="contact-info">
        <p><strong>Telefone</strong><br>{{ empresa.telefone }}</p>
        <p><strong>E-mail</strong><br>{{ empresa.email }}</p>
        <p><strong>Endereço</strong><br>{{ empresa.endereco }}</p>
    </div>

    <form class="contact-form" method="POST" action="/contato">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required>

        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

        <button type="submit" class="btn btn-primary">Enviar mensagem</button>
    </form>
</section>
{% endblock %}
